name: Send news digest

on:
  workflow_dispatch:
  schedule:
    # 08:17 America/Sao_Paulo. GitHub Actions schedules use UTC.
    # Avoid minute 0 because GitHub can delay or drop jobs during top-of-hour load.
    - cron: "17 11 * * 1,4"

jobs:
  send-digest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore sent-items history
        uses: actions/cache/restore@v4
        with:
          path: data/sent-items.json
          key: sent-items-${{ github.run_id }}
          restore-keys: |
            sent-items-

      - name: Validate required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          missing=0
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::Missing repository secret TELEGRAM_BOT_TOKEN"
            missing=1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Missing repository secret TELEGRAM_CHAT_ID"
            missing=1
          fi
          exit "$missing"

      - name: Send digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-flash' }}
          MAX_ITEMS_PER_DIGEST: ${{ vars.MAX_ITEMS_PER_DIGEST || '5' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '14' }}
          DIGEST_LANGUAGE: pt-BR
          SENT_ITEMS_PATH: data/sent-items.json
        run: npm run send

      - name: Save sent-items history
        if: success() && hashFiles('data/sent-items.json') != ''
        uses: actions/cache/save@v4
        with:
          path: data/sent-items.json
          key: sent-items-${{ github.run_id }}
